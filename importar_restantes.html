function log(msg, cls='info') {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function runImport() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Importando...';

  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    log('❌ Não logado! Faça login no sistema principal primeiro.', 'error');
    btn.disabled = false;
    return;
  }
  log('✅ Logado: ' + session.user.email, 'success');

  // Get group ID
  const { data: group } = await sb.from('groups').select('id').eq('name','HISPÂNICOS').single();
  if (!group) { log('❌ Grupo HISPÂNICOS não encontrado.', 'error'); return; }
  log('✅ Grupo encontrado: ' + group.id, 'success');

  const toInsert = ADDRESSES.map(a => ({
    code: a.code,
    name: a.name,
    street: a.street || null,
    number: a.number || null,
    neighborhood: a.neighborhood || null,
    city: a.city,
    lat: a.lat,
    lng: a.lng,
    status: 'pending',
    group_id: group.id,
    notes: a.notes || null,
  }));

  log(`📥 Inserindo ${toInsert.length} endereços com códigos únicos...`);
  
  // Insert one by one to handle any remaining conflicts gracefully
  let ok = 0, errs = 0;
  for (const addr of toInsert) {
    const { error } = await sb.from('addresses').insert(addr);
    if (error) {
      // If still duplicate, add timestamp suffix
      if (error.message.includes('duplicate')) {
        addr.code = addr.code.slice(0,4) + Math.random().toString(36).slice(2,4).toUpperCase();
        const { error: e2 } = await sb.from('addresses').insert(addr);
        if (e2) { log(`❌ ${addr.name}: ${e2.message}`, 'error'); errs++; }
        else { log(`✅ ${addr.name} (código ajustado: ${addr.code})`, 'success'); ok++; }
      } else {
        log(`❌ ${addr.name}: ${error.message}`, 'error');
        errs++;
      }
    } else {
      log(`✅ ${addr.name}`, 'success');
      ok++;
    }
  }

  log('', '');
  log(`✅ CONCLUÍDO! ${ok} importados, ${errs} erros.`, 'success');
  log(`Total geral: ${150 + ok}/182 endereços no sistema.`, 'info');
  btn.textContent = `✅ Concluído — ${ok} importados`;
}
