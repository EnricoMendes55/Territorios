function log(msg, cls='info') {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function runImport() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Importando...';

  // Check session
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    log('❌ Você não está logado! Abra o sistema principal, faça login, e volte aqui.', 'error');
    btn.disabled = false; btn.textContent = '🚀 Iniciar Importação';
    return;
  }
  log('✅ Usuário autenticado: ' + session.user.email, 'success');

  // Create city
  log('📍 Criando cidade "Rio do Sul"...');
  let cityId = null;
  const { data: existCity } = await sb.from('cities').select('id').eq('name','Rio do Sul').single();
  if (existCity) {
    cityId = existCity.id;
    log('  ↳ Cidade já existe: ' + cityId, 'info');
  } else {
    const { data: newCity, error: ce } = await sb.from('cities').insert({name:'Rio do Sul'}).select().single();
    if (ce) { log('❌ Erro ao criar cidade: ' + ce.message, 'error'); return; }
    cityId = newCity.id;
    log('  ↳ Cidade criada: ' + cityId, 'success');
  }

  // Create group HISPÂNICOS
  log('📁 Criando grupo "HISPÂNICOS"...');
  let groupId = null;
  const { data: existGroup } = await sb.from('groups').select('id').eq('name','HISPÂNICOS').single();
  if (existGroup) {
    groupId = existGroup.id;
    log('  ↳ Grupo já existe: ' + groupId, 'info');
  } else {
    const { data: newGroup, error: ge } = await sb.from('groups').insert({name:'HISPÂNICOS', icon:'🟡', city_id: cityId}).select().single();
    if (ge) { log('❌ Erro ao criar grupo: ' + ge.message, 'error'); return; }
    groupId = newGroup.id;
    log('  ↳ Grupo criado: ' + groupId, 'success');
  }

  // Insert addresses in chunks of 50
  log(`📥 Inserindo ${ADDRESSES.length} endereços...`);
  const toInsert = ADDRESSES.map(a => ({
    code: a.code,
    name: a.name,
    street: a.street || null,
    number: a.number || null,
    neighborhood: a.neighborhood || null,
    city: a.city,
    lat: a.lat,
    lng: a.lng,
    status: 'pending',
    group_id: groupId,
    notes: a.notes || null,
  }));

  let inserted = 0, errors = 0;
  const chunkSize = 50;
  for (let i = 0; i < toInsert.length; i += chunkSize) {
    const chunk = toInsert.slice(i, i + chunkSize);
    const { data, error } = await sb.from('addresses').insert(chunk).select('id');
    if (error) {
      log(`❌ Erro no lote ${Math.floor(i/chunkSize)+1}: ${error.message}`, 'error');
      errors += chunk.length;
    } else {
      inserted += (data||[]).length;
      log(`  ↳ Lote ${Math.floor(i/chunkSize)+1}: ${(data||[]).length} inseridos`, 'success');
    }
  }

  log(``, '');
  log(`✅ CONCLUÍDO! ${inserted} endereços importados, ${errors} erros.`, 'success');
  log(`↳ Acesse o sistema principal para ver os dados.`, 'info');
  btn.textContent = `✅ Importação concluída — ${inserted} endereços`;
}
